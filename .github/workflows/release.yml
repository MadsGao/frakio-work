name: Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to publish
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: mac
            arch: arm64
            package_script: desktop:dist:mac
          - runner: macos-15-intel
            platform: mac
            arch: x64
            package_script: desktop:dist:mac
          - runner: windows-2025
            platform: win
            arch: x64
            package_script: desktop:dist:win
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify tag matches package version
        shell: bash
        run: test "v$(node -p "require('./package.json').version")" = "${{ github.event.inputs.tag || github.ref_name }}"
      - name: Install uv
        if: runner.os != 'Windows'
        shell: bash
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install uv on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build standalone Hermes runtime
        if: runner.os != 'Windows'
        shell: bash
        run: PATH="$HOME/.local/bin:$PATH" npm run runtime:build
      - name: Build standalone Hermes runtime on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
          npm run runtime:build
      - run: npm run notices:generate
      - run: npm run ${{ matrix.package_script }}
      - name: Verify Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/verify-windows-installer.ps1
      - name: Generate checksums and SBOM
        run: node scripts/generate-release-metadata.mjs ${{ matrix.platform }} ${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*SHA256SUMS.txt
            release/*sbom.json
            THIRD_PARTY_NOTICES.txt
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish beta release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          mapfile -d '' release_files < <(find artifacts -type f -print0)
          node scripts/current-release-notes.mjs "$TAG" > /tmp/frakio-release-notes.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${release_files[@]}" --clobber
            gh release edit "$TAG" --prerelease --title "Frakio Work $TAG Beta" --notes-file /tmp/frakio-release-notes.md
          else
            gh release create "$TAG" "${release_files[@]}" --prerelease --title "Frakio Work $TAG Beta" --notes-file /tmp/frakio-release-notes.md
          fi
